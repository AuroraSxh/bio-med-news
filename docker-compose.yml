services:
  nginx:
    image: nginx:1.27-alpine
    container_name: biomed_news_nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - biomed_news_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biomed_news_frontend
    environment:
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-Biomed / Cell Therapy Daily}"
      NEXT_PUBLIC_API_BASE_PATH: "${NEXT_PUBLIC_API_BASE_PATH:-/api}"
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - biomed_news_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biomed_news_backend
    # Bind-mount source so Python-only changes need a restart, not a rebuild.
    # Dependency changes (pyproject.toml) still require `docker compose build`.
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/worker:/app/worker:ro
      - ./backend/config:/app/config:ro
      - ./backend/scripts:/app/scripts:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://biomed:biomed_password@postgres:5432/biomed_news}"
      GLM5_BASE_URL: "${GLM5_BASE_URL:-http://host.docker.internal:8001}"
      GLM5_API_KEY: "${GLM5_API_KEY:-change_me}"
      GLM5_MODEL_NAME: "${GLM5_MODEL_NAME:-glm-5}"
      INGESTION_TIMEZONE: "${INGESTION_TIMEZONE:-Asia/Shanghai}"
      INGESTION_SCHEDULE_HOURS: "${INGESTION_SCHEDULE_HOURS:-8,12,18}"
      INGESTION_MAX_ITEMS_PER_SOURCE: "${INGESTION_MAX_ITEMS_PER_SOURCE:-12}"
      INGESTION_SOURCES_JSON: "${INGESTION_SOURCES_JSON:-}"
      WORKER_RUN_ON_STARTUP: "${WORKER_RUN_ON_STARTUP:-true}"
      SOURCE_CONFIG_PATH: "${SOURCE_CONFIG_PATH:-config/sources.json}"
      SOURCE_REQUEST_TIMEOUT_SECONDS: "${SOURCE_REQUEST_TIMEOUT_SECONDS:-15}"
      SOURCE_REQUEST_MAX_ATTEMPTS: "${SOURCE_REQUEST_MAX_ATTEMPTS:-3}"
      SOURCE_REQUEST_BACKOFF_SECONDS: "${SOURCE_REQUEST_BACKOFF_SECONDS:-1.5}"
      GLM5_REQUEST_TIMEOUT_SECONDS: "${GLM5_REQUEST_TIMEOUT_SECONDS:-300}"
      GLM5_REQUEST_MAX_ATTEMPTS: "${GLM5_REQUEST_MAX_ATTEMPTS:-3}"
      GLM5_REQUEST_BACKOFF_SECONDS: "${GLM5_REQUEST_BACKOFF_SECONDS:-2}"
      SEED_SAMPLE_DATA: "${SEED_SAMPLE_DATA:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: "${LOG_FORMAT:-text}"
      ADMIN_REFRESH_TOKEN: "${ADMIN_REFRESH_TOKEN:-change_me}"
      APP_ENV: "${APP_ENV:-production}"
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - biomed_news_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biomed_news_worker
    command: ["python", "-m", "worker.run_worker"]
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/worker:/app/worker:ro
      - ./backend/config:/app/config:ro
      - ./backend/scripts:/app/scripts:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://biomed:biomed_password@postgres:5432/biomed_news}"
      GLM5_BASE_URL: "${GLM5_BASE_URL:-http://host.docker.internal:8001}"
      GLM5_API_KEY: "${GLM5_API_KEY:-change_me}"
      GLM5_MODEL_NAME: "${GLM5_MODEL_NAME:-glm-5}"
      INGESTION_TIMEZONE: "${INGESTION_TIMEZONE:-Asia/Shanghai}"
      INGESTION_SCHEDULE_HOURS: "${INGESTION_SCHEDULE_HOURS:-8,12,18}"
      INGESTION_MAX_ITEMS_PER_SOURCE: "${INGESTION_MAX_ITEMS_PER_SOURCE:-12}"
      INGESTION_SOURCES_JSON: "${INGESTION_SOURCES_JSON:-}"
      WORKER_RUN_ON_STARTUP: "${WORKER_RUN_ON_STARTUP:-true}"
      SOURCE_CONFIG_PATH: "${SOURCE_CONFIG_PATH:-config/sources.json}"
      SOURCE_REQUEST_TIMEOUT_SECONDS: "${SOURCE_REQUEST_TIMEOUT_SECONDS:-15}"
      SOURCE_REQUEST_MAX_ATTEMPTS: "${SOURCE_REQUEST_MAX_ATTEMPTS:-3}"
      SOURCE_REQUEST_BACKOFF_SECONDS: "${SOURCE_REQUEST_BACKOFF_SECONDS:-1.5}"
      GLM5_REQUEST_TIMEOUT_SECONDS: "${GLM5_REQUEST_TIMEOUT_SECONDS:-300}"
      GLM5_REQUEST_MAX_ATTEMPTS: "${GLM5_REQUEST_MAX_ATTEMPTS:-3}"
      GLM5_REQUEST_BACKOFF_SECONDS: "${GLM5_REQUEST_BACKOFF_SECONDS:-2}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: "${LOG_FORMAT:-text}"
      APP_ENV: "${APP_ENV:-production}"
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - biomed_news_net

  postgres:
    image: postgres:16-alpine
    container_name: biomed_news_postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-biomed_news}"
      POSTGRES_USER: "${POSTGRES_USER:-biomed}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-biomed_password}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biomed} -d ${POSTGRES_DB:-biomed_news}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - biomed_news_net

volumes:
  postgres_data:

networks:
  biomed_news_net:
    driver: bridge
